name: Supabase Keep Alive

# Free Supabase projects pause after ~7 days with no activity. This pings the DB
# twice a week so it never sleeps. Times are UTC; 20:00 UTC = 01:00 Asia/Karachi.
# Mondays and Thursdays => ~1 AM Tue & Fri in Karachi (never more than ~3-4 days idle).
on:
  schedule:
    - cron: '0 20 * * 1,4'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # These are PUBLIC values (publishable key + project URL ship in the browser bundle),
    # so they're inlined here — no GitHub secrets needed. RLS protects the actual data.
    env:
      SUPABASE_URL: 'https://cflrtbpmujrsvruncqwj.supabase.co'
      SUPABASE_PUBLISHABLE_KEY: 'sb_publishable_ZE-3RHcmoqjIuUwP8yesyg_RtA7NAzX'

    steps:
      - name: Query keep-alive table
        run: |
          response_file="$(mktemp)"
          status="$(
            curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
              --get "$SUPABASE_URL/rest/v1/keep_alive_checks" \
              --data-urlencode "select=id" \
              --data-urlencode "id=eq.1" \
              -H "apikey: $SUPABASE_PUBLISHABLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_PUBLISHABLE_KEY"
          )"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Supabase keep-alive request failed with HTTP $status."
            cat "$response_file"
            exit 1
          fi

          echo "Supabase keep-alive request succeeded (HTTP $status)."
          cat "$response_file"
